<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 4</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Задание 4</h1>
    <div id="stateBox" class="box"></div>
    <button id="changeState">Стандарт</button>
    <a href="index.html">Вернуться на главную</a>

    <script>
        const stateBox = document.getElementById('stateBox');
        const changeBtn = document.getElementById('changeState');
        let state = 0;
        const states = [
            { class: 'box', text: 'Стандарт' },
            { class: 'box large red', text: 'Большой красный' },
            { class: 'box small blue', text: 'Маленький синий' },
            { class: 'box medium green', text: 'Средний зелёный' }
        ];

        changeBtn.addEventListener('click', () => {
            state = (state + 1) % states.length;
            stateBox.className = states[state].class;
            changeBtn.textContent = states[state].text;
        });
    </script>
</body>
</html>
