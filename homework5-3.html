<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB.HW.05.03 - Отслеживание позиции мыши</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef4fb;
            color: #222;
            padding: 24px;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
            padding: 24px;
        }
        .tracker {
            width: 100%;
            height: 320px;
            border: 2px dashed #7d9eef;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #eef4ff;
            transition: background-color 0.2s ease;
            position: relative;
            font-size: 1.1em;
        }
        .tracker.active {
            background-color: #ffdddd;
        }
        .tracker-text {
            font-size: 1.2em;
            text-align: center;
            padding: 10px 16px;
        }
        .output {
            margin-top: 18px;
            background-color: #f4f6fb;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #d9dfe8;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WEB.HW.05.03 - Отслеживание позиции мыши</h1>
        <p>Наведите курсор на область ниже, и позиция мыши будет обновляться в реальном времени.</p>
        <div id="tracker" class="tracker">
            <div class="tracker-text">Переместите мышь по этой области</div>
        </div>
        <div id="output" class="output">X: -, Y: -</div>
        <a href="index.html" class="back-link">← На главную</a>
    </div>
    <script>
        const tracker = document.getElementById('tracker');
        const output = document.getElementById('output');

        tracker.addEventListener('mouseover', () => {
            tracker.classList.add('active');
        });

        tracker.addEventListener('mouseout', () => {
            tracker.classList.remove('active');
            output.textContent = 'X: -, Y: -';
        });

        tracker.addEventListener('mousemove', event => {
            const x = event.clientX;
            const y = event.clientY;
            output.textContent = `Позиция мыши: X = ${x}, Y = ${y}`;
        });
    </script>
</body>
</html>
